<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - Flower World</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <h1>Flower World</h1>
                <img src="./storefront.jpg" alt="Flower World Storefront" class="centered-circle-photo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="pricing.html">Pricing</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <h2>Order Your Custom Bouquet</h2>
        <p class="center-text">Tell us what you need, and we will craft a bouquet that speaks your feelings.</p>

        <form action="#" method="post">
            <fieldset>
                <legend>Customer Information</legend>
                
                <p>
                    <label for="full-name">Your Full Name:</label>
                    <input type="text" id="full-name" name="full-name" required>
                </p>

                <p>
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </p>
            </fieldset>

            <fieldset>
                <legend>Bouquet Details</legend>

                <p>
                    <label for="occasion">Occasion:</label>
                    <select id="occasion" name="occasion">
                        <option value="birthday">Birthday</option>
                        <option value="wedding">Wedding</option>
                        <option value="anniversary">Anniversary</option>
                        <option value="other">Other</option>
                    </select>
                </p>

                <p>
                    <label for="message">Describe Your Dream Bouquet:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Which flowers and colors do you prefer?"></textarea>
                </p>
            </fieldset>

            <button type="submit">Send Request</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Flower World. All rights reserved.</p>
    </footer>
</body>
</html>
